<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeSync | Submission Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary: #6c63ff;
            --secondary: #4a44c6;
            --accent: #ff6584;
            --dark: #2a2a3c;
            --light: #f8f9fa;
            --success: #4caf50;
            --warning: #ff9800;
            --danger: #f44336;
            --card-bg: #ffffff;
            --shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: var(--light);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            animation: fadeInDown 1s ease;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--light);
        }

        .logo i {
            color: var(--primary);
            font-size: 2.2rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            animation: pulse 2s infinite;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .dashboard-title {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 2.5rem;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: fadeIn 1.5s ease;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            color: var(--dark);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeInUp 0.8s ease;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
        }

        .card-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--dark);
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5ee;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.2);
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--secondary);
            transform: translateY(-3px);
            box-shadow: 0 7px 15px rgba(108, 99, 255, 0.4);
        }

        .btn-block {
            width: 100%;
        }

        .submission-list {
            max-height: 400px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .submission-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1rem;
            border-left: 4px solid var(--primary);
            animation: slideInRight 0.5s ease;
            transition: all 0.3s ease;
        }

        .submission-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .submission-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .submission-user {
            font-weight: 600;
            color: var(--dark);
        }

        .submission-time {
            color: #6c757d;
            font-size: 0.9rem;
        }

        .submission-id {
            font-size: 0.85rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .submission-count {
            display: inline-block;
            padding: 3px 10px;
            background: var(--primary);
            color: white;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 1rem;
            border-radius: 10px;
            text-align: center;
            animation: pulse 2s infinite;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .floating-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .floating-element {
            position: absolute;
            background: rgba(108, 99, 255, 0.1);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        .floating-element:nth-child(1) {
            width: 80px;
            height: 80px;
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .floating-element:nth-child(2) {
            width: 120px;
            height: 120px;
            top: 70%;
            left: 80%;
            animation-delay: 1s;
        }

        .floating-element:nth-child(3) {
            width: 60px;
            height: 60px;
            top: 50%;
            left: 20%;
            animation-delay: 2s;
        }

        .floating-element:nth-child(4) {
            width: 100px;
            height: 100px;
            top: 20%;
            left: 70%;
            animation-delay: 3s;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--secondary);
        }
    </style>
</head>
<body>
    <div class="floating-elements">
        <div class="floating-element"></div>
        <div class="floating-element"></div>
        <div class="floating-element"></div>
        <div class="floating-element"></div>
    </div>

    <div class="container">
        <header>
            <div class="logo">
                <i class="fas fa-code"></i>
                <span>CodeSync</span>
            </div>
            <div class="user-info">
                <div class="user-avatar">JD</div>
                <div>John Developer</div>
            </div>
        </header>

        <h1 class="dashboard-title">Submission Dashboard</h1>

        <div class="dashboard">
            <div class="card">
                <h2 class="card-title"><i class="fas fa-plus-circle"></i> New Submission</h2>
                <form id="submissionForm">
                    <div class="form-group">
                        <label for="userID">User ID</label>
                        <input type="text" id="userID" class="form-control" placeholder="Enter your user ID" required>
                    </div>
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" class="form-control" placeholder="Enter your username" required>
                    </div>
                    <div class="form-group">
                        <label for="submissionID">Submission ID</label>
                        <input type="text" id="submissionID" class="form-control" placeholder="Enter submission ID" required>
                    </div>
                    <div class="form-group">
                        <label for="submissionTime">Submission Time</label>
                        <input type="datetime-local" id="submissionTime" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="submissionCount">Number of Submissions</label>
                        <input type="number" id="submissionCount" class="form-control" min="1" value="1" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">
                        <i class="fas fa-paper-plane"></i> Submit
                    </button>
                </form>
            </div>

            <div class="card">
                <h2 class="card-title"><i class="fas fa-history"></i> Recent Submissions</h2>
                <div class="submission-list" id="submissionList">
                    <!-- Submissions will be added here dynamically -->
                </div>
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-value" id="totalSubmissions">0</div>
                        <div class="stat-label">Total Submissions</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="todaySubmissions">0</div>
                        <div class="stat-label">Today's Submissions</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('submissionForm');
            const submissionList = document.getElementById('submissionList');
            const totalSubmissions = document.getElementById('totalSubmissions');
            const todaySubmissions = document.getElementById('todaySubmissions');
            
            let submissions = [];
            let submissionCount = 0;
            let todayCount = 0;

            // Set default time to current time
            const now = new Date();
            const formattedNow = now.toISOString().slice(0, 16);
            document.getElementById('submissionTime').value = formattedNow;

            // Form submission handler
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const userID = document.getElementById('userID').value;
                const username = document.getElementById('username').value;
                const submissionID = document.getElementById('submissionID').value;
                const submissionTime = document.getElementById('submissionTime').value;
                const submissionCountValue = document.getElementById('submissionCount').value;
                
                // Create submission object
                const submission = {
                    userID,
                    username,
                    submissionID,
                    submissionTime: new Date(submissionTime).toLocaleString(),
                    submissionCount: submissionCountValue
                };
                
                // Add to submissions array
                submissions.unshift(submission);
                
                // Update counters
                submissionCount += parseInt(submissionCountValue);
                totalSubmissions.textContent = submissionCount;
                
                // Check if submission is from today
                const submissionDate = new Date(submissionTime);
                const today = new Date();
                if (submissionDate.toDateString() === today.toDateString()) {
                    todayCount += parseInt(submissionCountValue);
                    todaySubmissions.textContent = todayCount;
                }
                
                // Add to UI
                addSubmissionToUI(submission);
                
                // Reset form
                form.reset();
                document.getElementById('submissionTime').value = formattedNow;
                
                // Show success animation
                const submitBtn = document.querySelector('.btn-primary');
                submitBtn.innerHTML = '<i class="fas fa-check"></i> Submitted!';
                submitBtn.style.background = 'var(--success)';
                
                setTimeout(() => {
                    submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit';
                    submitBtn.style.background = 'var(--primary)';
                }, 2000);
            });
            
            // Function to add submission to UI
            function addSubmissionToUI(submission) {
                const submissionItem = document.createElement('div');
                submissionItem.className = 'submission-item';
                
                submissionItem.innerHTML = `
                    <div class="submission-header">
                        <div class="submission-user">${submission.username}</div>
                        <div class="submission-time">${submission.submissionTime}</div>
                    </div>
                    <div class="submission-id">ID: ${submission.submissionID} | User ID: ${submission.userID}</div>
                    <div class="submission-count">${submission.submissionCount} Submission${submission.submissionCount > 1 ? 's' : ''}</div>
                `;
                
                submissionList.prepend(submissionItem);
                
                // Remove oldest submission if more than 5
                if (submissionList.children.length > 5) {
                    submissionList.removeChild(submissionList.lastChild);
                }
            }
            
            // Add some sample submissions
            const sampleSubmissions = [
                {
                    userID: "U1001",
                    username: "coder42",
                    submissionID: "S2023001",
                    submissionTime: new Date(now.getTime() - 30*60000).toLocaleString(),
                    submissionCount: "2"
                },
                {
                    userID: "U1002",
                    username: "devmaster",
                    submissionID: "S2023002",
                    submissionTime: new Date(now.getTime() - 60*60000).toLocaleString(),
                    submissionCount: "1"
                },
                {
                    userID: "U1003",
                    username: "webwizard",
                    submissionID: "S2023003",
                    submissionTime: new Date(now.getTime() - 90*60000).toLocaleString(),
                    submissionCount: "3"
                }
            ];
            
            // Initialize with sample data
            sampleSubmissions.forEach(submission => {
                submissions.push(submission);
                submissionCount += parseInt(submission.submissionCount);
                addSubmissionToUI(submission);
            });
            
            totalSubmissions.textContent = submissionCount;
            todaySubmissions.textContent = submissionCount; // For demo purposes
        });
    </script>
</body>
</html>
